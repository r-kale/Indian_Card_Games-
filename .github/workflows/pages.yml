name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - name: Build client
        run: npm run build -w @icg/client
        env:
          # Project pages are served from /<repo-name>/
          BASE_PATH: /${{ github.event.repository.name }}/
          # Optional: set a GAME_SERVER_URL repository variable (Settings →
          # Secrets and variables → Actions → Variables) pointing at a hosted
          # Socket.IO server to enable online rooms from the Pages site.
          VITE_SERVER_URL: ${{ vars.GAME_SERVER_URL }}
          # Optional dedicated TURN relay for P2P rooms (e.g. a free
          # metered.ca account): set TURN_URL (comma-separated turn: urls),
          # TURN_USERNAME and TURN_CREDENTIAL as repo secrets or variables.
          # (They end up in the public bundle either way — TURN creds are
          # never secret from players; the free tier is usage-capped.)
          VITE_TURN_URL: ${{ secrets.TURN_URL || vars.TURN_URL }}
          VITE_TURN_USERNAME: ${{ secrets.TURN_USERNAME || vars.TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.TURN_CREDENTIAL || vars.TURN_CREDENTIAL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
